name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

env:
  DEPENDENCIES_CACHE: cache-node-modules
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5
      - run: npx nx run-many -t build -c production --parallel --max-parallel=6

  test:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests with coverage
        run: npx nx run-many -t test --parallel --max-parallel=6

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - run: npx nx run-many -t lint --parallel --max-parallel=6

