name: Publish Docs

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*

env:
  DEPENDENCIES_CACHE: cache-node-modules
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main

      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main
      - uses: ./.github/actions/use-cache
      - name: Install dependencies
        run: pnpm install
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build core site
        run: DOCS_BASE=/ghentcdh-monorepo/core npx nx run docs:build:core

      - name: Build ui site
        run: DOCS_BASE=/ghentcdh-monorepo/ui npx nx run docs:build:ui

      - name: Merge sites into single dist
        run: |
          mkdir -p dist-pages/core dist-pages/ui
          cp -r docs/core-site/.vuepress/dist/. dist-pages/core/
          cp -r docs/ui-site/.vuepress/dist/. dist-pages/ui/
          # Add a root index that redirects to core (or change to ui if preferred)
          echo '<meta http-equiv="refresh" content="0; url=core/">' > dist-pages/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
